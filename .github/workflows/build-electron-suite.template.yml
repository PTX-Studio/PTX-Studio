name: Build Electron suite from private source

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to build
        required: true
      source_ref:
        description: Private source ref, branch, or tag
        required: true
        default: main

permissions:
  contents: read
  actions: read
  attestations: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.product }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        product: [studio, editor_express, editor_pro]

    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PTX_SOURCE_REPOSITORY }}
          token: ${{ secrets.PTX_SOURCE_REPOSITORY_TOKEN }}
          ref: ${{ inputs.source_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build product
        run: npm run build:${{ matrix.product }} -- --version=${{ inputs.version }}

      - name: Upload unsigned build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.product }}-${{ matrix.os }}-${{ inputs.version }}
          path: |
            dist/**/*.exe
            dist/**/*.dmg
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.rpm
            dist/**/*.zip
          if-no-files-found: error

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/**/*.exe
            dist/**/*.dmg
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.rpm
            dist/**/*.zip

