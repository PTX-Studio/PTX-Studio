name: Bug report
description: Report a PTX Studio product issue
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: dropdown
    id: product
    attributes:
      label: Product
      options:
        - PTX Studio
        - PTX Editor Express
        - PTX Editor Pro
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "1.1.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the issue and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true

